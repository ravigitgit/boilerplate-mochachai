name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          node server.js > server.log 2>&1 &
          sleep 5

      - name: Run tests
        run: npx mocha tests/*.js --ui tdd --timeout 10000 --exit

      - name: Stop server
        if: always()
        run: pkill -f "node server.js" || true